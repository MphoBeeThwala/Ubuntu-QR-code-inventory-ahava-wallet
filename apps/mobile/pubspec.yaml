name: ahava_ewallet
description: Ahava eWallet — inclusive South African digital wallet
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.5
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Navigation
  go_router: ^13.2.0

  # HTTP & API
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1
  dio_certificate_pinning: ^4.0.0   # Certificate pinning — MANDATORY for banking app

  # Local storage
  hive_flutter: ^1.1.0              # Offline inventory / wallet state
  drift: ^2.18.0                    # SQLite ORM for complex offline queries
  flutter_secure_storage: ^9.0.0    # Encrypted keychain for JWT + PIN hash

  # Authentication
  local_auth: ^2.2.0               # Touch ID / Face ID biometric
  
  # QR Code
  mobile_scanner: ^4.0.1           # ML Kit + ZXing — best low-light performance
  qr_flutter: ^4.1.0               # QR display widget

  # Cryptography (client-side PIN hashing before transmission)
  crypto: ^3.0.3
  pointycastle: ^3.8.0             # Argon2id client-side hash

  # UI
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0                   # Loading skeletons
  lottie: ^3.1.0                    # Payment success animations
  fl_chart: ^0.68.0                 # Transaction history charts

  # Notifications
  firebase_core: ^2.31.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.1.2

  # Utilities
  intl: ^0.19.0                     # ZAR formatting, SAST dates, i18n
  connectivity_plus: ^6.0.3         # Offline detection
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0         # Device fingerprint for binding
  path_provider: ^2.1.3
  uuid: ^4.4.0                      # Idempotency key generation
  collection: ^1.18.0

  # PDF / Printing (QR labels + receipts)
  pdf: ^3.11.0
  printing: ^5.13.0

  # Permissions
  permission_handler: ^11.3.1

  # Analytics & crash reporting
  firebase_analytics: ^10.10.0
  sentry_flutter: ^8.1.0

  # Deep links
  app_links: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  
  bloc_test: ^9.1.7
  mocktail: ^1.0.3
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  drift_dev: ^2.18.0
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  freezed_annotation: ^2.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: AhavaSans
      fonts:
        - asset: assets/fonts/AhavaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/AhavaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/AhavaSans-SemiBold.ttf
          weight: 600
