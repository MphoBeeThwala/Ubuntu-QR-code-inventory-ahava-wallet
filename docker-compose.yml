version: '3.9'

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: ahava-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ahava
      POSTGRES_PASSWORD: ahava_dev_pw_local
      POSTGRES_DB: ahava_dev
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ahava -d ahava_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ahava-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
